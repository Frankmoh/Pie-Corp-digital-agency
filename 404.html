<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found | PIE CORP DIGITAL AGENCY</title>
    <link rel="icon" type="image/jpeg" href="/images/new logo.jpeg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #090b1a 0%, #15183d 40%, #180f3c 100%);
            color: #f8fafc;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 600px; }
        h1 {
            font-size: 6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #5d3fd3, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        h2 { font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
        p { color: rgba(199, 210, 254, 0.9); margin-bottom: 2rem; line-height: 1.6; }
        a {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #5d3fd3, #f472b6);
            color: #fff;
            text-decoration: none;
            border-radius: 999px;
            font-weight: 700;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(93, 63, 211, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
